# render.yaml — Render Blueprint for Hikmah FastAPI Backend
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: hikmah-backend
    runtime: python
    plan: free
    region: singapore  # closest to Southeast Asia
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /health
    autoDeploy: true
